<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HVY Lightweight Viewer Text Editor</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f4ef;
        color: #1f2522;
      }

      html,
      body {
        height: auto !important;
        min-height: 100%;
        overflow-y: auto !important;
      }

      body {
        margin: 0;
        overflow-x: hidden !important;
      }

      .viewer-example-shell {
        min-height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 0.85rem;
        padding: 1rem;
        box-sizing: border-box;
      }

      .viewer-example-topbar,
      .viewer-example-footer,
      .viewer-example-frame {
        width: min(960px, 100%);
        margin: 0 auto;
      }

      .viewer-example-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
      }

      .viewer-example-title {
        display: grid;
        gap: 0.2rem;
      }

      .viewer-example-title h1 {
        margin: 0;
        font-size: 1.08rem;
        line-height: 1.2;
      }

      .viewer-example-title span,
      .viewer-example-footer {
        color: #5a625c;
        font-size: 0.82rem;
      }

      .viewer-example-button {
        border: 1px solid #7a867e;
        border-radius: 7px;
        background: #ffffff;
        color: #1f2522;
        padding: 0.44rem 0.68rem;
        font: inherit;
        font-size: 0.84rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 1px 2px rgba(31, 37, 34, 0.12);
      }

      .viewer-example-button:hover {
        background: #edf5f0;
      }

      .viewer-example-frame {
        min-height: 420px;
        border: 1px solid #c7d0c8;
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
      }

      #lightweightViewerOnlyMount {
        min-height: 420px;
      }

      .viewer-example-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.8rem;
      }

      .viewer-example-status {
        min-width: 11rem;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="viewer-example-shell">
      <header class="viewer-example-topbar">
        <div class="viewer-example-title">
          <h1>Lightweight Viewer Text Editor</h1>
          <span>Viewer-only mount using <code>/src/embed.ts</code>.</span>
        </div>
        <button type="button" class="viewer-example-button" id="resetViewerExample">Reset</button>
      </header>
      <main class="viewer-example-frame">
        <div id="lightweightViewerOnlyMount"></div>
      </main>
      <footer class="viewer-example-footer">
        <span>Use the plugin text editor toolbar directly in viewer mode.</span>
        <span class="viewer-example-status" id="viewerExampleStatus">Ready.</span>
      </footer>
    </div>

    <script type="module">
      import { deserializeDocumentBytes, mountHvy, serializeDocument } from '/src/embed.ts';
      import { viewerNotePlugin } from '/src/plugins/viewer-note.ts';

      const source = `---
hvy_version: 0.1
title: Lightweight Viewer Text Editor
plugins:
  - id: hvy.viewer-note
---

<!--hvy: {"id":"main"}-->
#! Viewer

 <!--hvy:plugin {"id":"viewer-note","plugin":"hvy.viewer-note"}-->
`;

      const encoder = new TextEncoder();
      const root = document.querySelector('#lightweightViewerOnlyMount');
      const status = document.querySelector('#viewerExampleStatus');
      let mount = null;

      function createDocument() {
        return deserializeDocumentBytes(encoder.encode(source), '.hvy');
      }

      function mountExample() {
        mount?.destroy();
        mount = mountHvy({
          root,
          document: createDocument(),
          mode: 'viewer',
          plugins: [viewerNotePlugin],
        });
        status.textContent = 'Mounted viewer.';
      }

      document.querySelector('#resetViewerExample').addEventListener('click', mountExample);

      window.lightweightViewerTextEditorExample = {
        getDocument: () => mount.getDocument(),
        serialize: () => serializeDocument(mount.getDocument()),
        reset: mountExample,
      };

      mountExample();
    </script>
  </body>
</html>
