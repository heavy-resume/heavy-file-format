<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HVY Two Embedded Documents</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f0e8;
        color: #231f1a;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
      }

      .page-shell {
        height: 100vh;
        padding: 1rem;
        box-sizing: border-box;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 1rem;
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        width: 100%;
        margin: 0 auto;
        max-width: 1500px;
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .topbar button {
        border: 1px solid #857665;
        border-radius: 7px;
        background: #fffaf2;
        color: #231f1a;
        padding: 0.45rem 0.7rem;
        font: inherit;
        cursor: pointer;
      }

      .two-doc-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        min-height: 0;
        height: 100%;
        width: 100%;
        max-width: 1500px;
        margin: 0 auto;
      }

      .doc-frame {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid #c5b9a9;
        border-radius: 8px;
        background: #fffaf2;
        overflow: hidden;
      }

      .doc-frame-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.65rem 0.75rem;
        border-bottom: 1px solid #d9ceb8;
        background: #ede3d1;
      }

      .doc-frame-header strong {
        font-size: 0.92rem;
      }

      .mode-control {
        display: inline-flex;
        align-items: center;
        gap: 0;
        padding: 0.16rem;
        border: 1px solid #b19d83;
        border-radius: 7px;
        background: #fffaf2;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .mode-button {
        min-width: 4.2rem;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: #4d4135;
        padding: 0.34rem 0.52rem;
        font: inherit;
        font-size: 0.78rem;
        font-weight: 700;
        cursor: pointer;
      }

      .mode-button[aria-pressed="true"] {
        background: #6f4f2f;
        color: #fffaf2;
        box-shadow: 0 1px 2px rgba(35, 31, 26, 0.2);
      }

      .mount-point {
        min-height: 0;
        height: 100%;
      }

      .event-log {
        width: 100%;
        max-width: 1500px;
        max-height: 5.5rem;
        overflow: auto;
        margin: 0 auto;
        padding: 0.75rem;
        border: 1px solid #c5b9a9;
        border-radius: 8px;
        background: #fffaf2;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.82rem;
        white-space: pre-wrap;
      }

      @media (max-width: 900px) {
        .page-shell {
          height: auto;
          min-height: 100vh;
          overflow: visible;
        }

        .two-doc-grid {
          grid-template-columns: 1fr;
          height: auto;
        }

        .mount-point {
          height: 680px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="topbar">
        <h1>Two Embedded HVY Documents</h1>
        <button type="button" id="resetSessions">Reset sessions</button>
      </div>
      <div class="two-doc-grid">
        <section class="doc-frame">
          <div class="doc-frame-header">
            <strong>Document One</strong>
            <div class="mode-control" role="group" aria-label="Document One mode">
              <button type="button" class="mode-button" data-doc-one-mode="viewer" aria-pressed="false">Viewer</button>
              <button type="button" class="mode-button" data-doc-one-mode="editor" aria-pressed="true">Editor</button>
              <button type="button" class="mode-button" data-doc-one-mode="ai" aria-pressed="false">AI</button>
            </div>
          </div>
          <div id="docOne" class="mount-point"></div>
        </section>
        <section class="doc-frame">
          <div class="doc-frame-header">
            <strong>Document Two</strong>
            <span>storageKey: two-doc-reference-two</span>
          </div>
          <div id="docTwo" class="mount-point"></div>
        </section>
      </div>
      <pre id="eventLog" class="event-log">Ready.</pre>
    </div>

    <script type="module">
      import exampleHvyUrl from '/examples/example.hvy?url';
      import resumeHvyUrl from '/examples/resume.hvy?url';
      import { deserializeDocumentBytes, mountHvy } from '/src/embed-full.ts';

      const eventLog = document.querySelector('#eventLog');
      const mounted = [];
      let docOneMode = 'editor';
      let docOneMountRequest = 0;
      let docOneDocument = null;

      const writeLog = (message) => {
        const timestamp = new Date().toLocaleTimeString();
        eventLog.textContent = `${timestamp} ${message}\n${eventLog.textContent}`;
      };

      const setDocOneModeButtons = () => {
        document.querySelectorAll('[data-doc-one-mode]').forEach((button) => {
          button.setAttribute('aria-pressed', button.dataset.docOneMode === docOneMode ? 'true' : 'false');
        });
      };

      const makeChatClient = (label) => ({
        async complete(request, options = {}) {
          if (options.signal?.aborted) {
            throw new DOMException('Aborted', 'AbortError');
          }
          await new Promise((resolve) => setTimeout(resolve, label === 'Document One' ? 260 : 60));
          const input = String(request.context || '').split('\n').slice(1).join(' ').trim();
          const output = `${label} generated from: ${input}`;
          writeLog(`${label} complete() -> ${output}`);
          return { output };
        },
      });

      async function loadExampleDocument() {
        if (docOneDocument) {
          return docOneDocument;
        }
        const response = await fetch(exampleHvyUrl);
        if (!response.ok) {
          throw new Error(`Could not load example document: ${response.status} ${response.statusText}`);
        }
        docOneDocument = deserializeDocumentBytes(new Uint8Array(await response.arrayBuffer()), '.hvy');
        return docOneDocument;
      }

      async function loadResumeDocument() {
        const response = await fetch(resumeHvyUrl);
        if (!response.ok) {
          throw new Error(`Could not load resume example: ${response.status} ${response.statusText}`);
        }
        return deserializeDocumentBytes(new Uint8Array(await response.arrayBuffer()), '.hvy');
      }

      function mountLoadedFirstDocument(exampleDocument) {
        mounted[0]?.destroy();
        const firstRoot = document.querySelector('#docOne');
        mounted[0] = mountHvy({
          root: firstRoot,
          document: exampleDocument,
          mode: docOneMode,
          storageKey: 'two-doc-reference-example',
          chatClient: makeChatClient('Document One'),
        });
        setDocOneModeButtons();
        writeLog(`Mounted Document One in ${docOneMode} mode.`);
      }

      async function mountFirstDocument() {
        const requestId = ++docOneMountRequest;
        const exampleDocument = await loadExampleDocument();
        if (requestId !== docOneMountRequest) {
          return;
        }
        mountLoadedFirstDocument(exampleDocument);
      }

      async function mountPair() {
        mounted.splice(0).forEach((mount) => mount.destroy());
        const secondRoot = document.querySelector('#docTwo');
        const [exampleDocument, resumeDocument] = await Promise.all([
          loadExampleDocument(),
          loadResumeDocument(),
        ]);
        docOneMountRequest += 1;
        mountLoadedFirstDocument(exampleDocument);
        mounted[1] =
          mountHvy({
            root: secondRoot,
            document: resumeDocument,
            mode: 'viewer',
            storageKey: 'two-doc-reference-two',
          });
        writeLog('Mounted both documents.');
      }

      document.querySelectorAll('[data-doc-one-mode]').forEach((button) => {
        button.addEventListener('click', () => {
          const nextMode = button.dataset.docOneMode;
          if (!nextMode || nextMode === docOneMode) {
            return;
          }
          docOneMode = nextMode;
          setDocOneModeButtons();
          void mountFirstDocument();
        });
      });

      document.querySelector('#resetSessions').addEventListener('click', () => {
        sessionStorage.removeItem('hvy-editor-session-state-v1:two-doc-reference-example');
        sessionStorage.removeItem('hvy-editor-session-state-v1:two-doc-reference-two');
        void mountPair();
        writeLog('Reset both keyed sessions.');
      });

      void mountPair();
    </script>
  </body>
</html>
