<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HVY Two Embedded Documents</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f4f0e8;
        color: #231f1a;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
      }

      .page-shell {
        height: 100vh;
        padding: 1rem;
        box-sizing: border-box;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        gap: 1rem;
        overflow: hidden;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        width: 100%;
        margin: 0 auto;
        max-width: 1500px;
      }

      .topbar h1 {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
      }

      .topbar button {
        border: 1px solid #857665;
        border-radius: 7px;
        background: #fffaf2;
        color: #231f1a;
        padding: 0.45rem 0.7rem;
        font: inherit;
        cursor: pointer;
      }

      .two-doc-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
        min-height: 0;
        height: 100%;
        width: 100%;
        max-width: 1500px;
        margin: 0 auto;
      }

      .doc-frame {
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border: 1px solid #c5b9a9;
        border-radius: 8px;
        background: #fffaf2;
        overflow: hidden;
      }

      .doc-frame-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.65rem 0.75rem;
        border-bottom: 1px solid #d9ceb8;
        background: #ede3d1;
      }

      .doc-frame-header strong {
        font-size: 0.92rem;
      }

      .mount-point {
        min-height: 0;
        height: 100%;
      }

      .event-log {
        width: 100%;
        max-width: 1500px;
        max-height: 5.5rem;
        overflow: auto;
        margin: 0 auto;
        padding: 0.75rem;
        border: 1px solid #c5b9a9;
        border-radius: 8px;
        background: #fffaf2;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 0.82rem;
        white-space: pre-wrap;
      }

      @media (max-width: 900px) {
        .page-shell {
          height: auto;
          min-height: 100vh;
          overflow: visible;
        }

        .two-doc-grid {
          grid-template-columns: 1fr;
          height: auto;
        }

        .mount-point {
          height: 680px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-shell">
      <div class="topbar">
        <h1>Two Embedded HVY Documents</h1>
        <button type="button" id="resetSessions">Reset sessions</button>
      </div>
      <div class="two-doc-grid">
        <section class="doc-frame">
          <div class="doc-frame-header">
            <strong>Document One</strong>
            <span>storageKey: two-doc-reference-one</span>
          </div>
          <div id="docOne" class="mount-point"></div>
        </section>
        <section class="doc-frame">
          <div class="doc-frame-header">
            <strong>Document Two</strong>
            <span>storageKey: two-doc-reference-two</span>
          </div>
          <div id="docTwo" class="mount-point"></div>
        </section>
      </div>
      <pre id="eventLog" class="event-log">Ready.</pre>
    </div>

    <script type="module">
      import { deserializeDocumentBytes, mountHvy } from '/src/embed-full.ts';

      const encoder = new TextEncoder();
      const eventLog = document.querySelector('#eventLog');
      const mounted = [];

      const writeLog = (message) => {
        const timestamp = new Date().toLocaleTimeString();
        eventLog.textContent = `${timestamp} ${message}\n${eventLog.textContent}`;
      };

      const makeDocumentSource = (label, sourceText, sidebarText) => `---
hvy_version: 0.1
title: ${label}
---

<!--hvy: {"id":"summary"}-->
#! ${label}

 <!--hvy:text {"id":"source-text"}-->
  ${sourceText}

 <!--hvy:text {"id":"generated-output"}-->
  Waiting for generated output.

 <!--hvy:button {"id":"generate-summary","buttonLabel":"Generate output","buttonAction":"ai-generate","buttonPositionTargetId":"generated-output","buttonCss":"position: absolute; top: 0.25rem; right: 0.25rem; --hvy-button-content-padding: 0.28rem 0.46rem; --hvy-button-font-size: 0.78rem;","buttonInputCharLimit":600,"buttonOutputCharLimit":240,"buttonSourceScript":"return doc.component.get_text('source-text').strip()","buttonPrompt":"Return a short generated line for the embedded document that provided this input.","buttonTargetScript":"doc.component.set_text('generated-output', response.strip())"}-->

<!--hvy: {"id":"side-notes","location":"sidebar"}-->
#! ${label} Side Notes

 <!--hvy:text {"id":"side-note"}-->
  ${sidebarText}
`;

      const makeChatClient = (label) => ({
        async complete(request, options = {}) {
          if (options.signal?.aborted) {
            throw new DOMException('Aborted', 'AbortError');
          }
          await new Promise((resolve) => setTimeout(resolve, label === 'Document One' ? 260 : 60));
          const input = String(request.context || '').split('\n').slice(1).join(' ').trim();
          const output = `${label} generated from: ${input}`;
          writeLog(`${label} complete() -> ${output}`);
          return { output };
        },
      });

      function mountPair() {
        mounted.splice(0).forEach((mount) => mount.destroy());
        const firstRoot = document.querySelector('#docOne');
        const secondRoot = document.querySelector('#docTwo');
        mounted.push(
          mountHvy({
            root: firstRoot,
            document: deserializeDocumentBytes(encoder.encode(makeDocumentSource('Document One', 'First document source text.', 'Sidebar note for the first embedded document.')), '.hvy'),
            mode: 'editor',
            storageKey: 'two-doc-reference-one',
            chatClient: makeChatClient('Document One'),
          })
        );
        mounted.push(
          mountHvy({
            root: secondRoot,
            document: deserializeDocumentBytes(encoder.encode(makeDocumentSource('Document Two', 'Second document source text.', 'Sidebar note for the second embedded document.')), '.hvy'),
            mode: 'viewer',
            storageKey: 'two-doc-reference-two',
            chatClient: makeChatClient('Document Two'),
          })
        );
        writeLog('Mounted both documents.');
      }

      document.querySelector('#resetSessions').addEventListener('click', () => {
        sessionStorage.removeItem('hvy-editor-session-state-v1:two-doc-reference-one');
        sessionStorage.removeItem('hvy-editor-session-state-v1:two-doc-reference-two');
        mountPair();
        writeLog('Reset both keyed sessions.');
      });

      mountPair();
    </script>
  </body>
</html>
